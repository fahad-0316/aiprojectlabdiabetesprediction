<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction System</title>
    <meta name="theme-color" content="#0b1220">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header class="hero">
            <div class="hero-text">
                <h1>🩺 Diabetes Prediction System</h1>
                <p class="subtitle">Quick, interpretable KNN predictions on the Pima dataset — built for clarity.</p>
            </div>
            <div class="hero-cta">
                <div class="palette" title="Theme colors">
                    <span class="dot c1"></span>
                    <span class="dot c2"></span>
                    <span class="dot c3"></span>
                    <span class="dot c4"></span>
                </div>
            </div>
        </header>

        <main class="main-grid">
            <section class="form-card">
                <h2>Patient Data</h2>
                <form action="/predict" method="POST">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Pregnancies</label>
                            <input type="number" name="pregnancies" placeholder="e.g. 2" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Glucose Level</label>
                            <input type="number" name="glucose" placeholder="e.g. 120" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Blood Pressure</label>
                            <input type="number" name="bloodpressure" placeholder="e.g. 70" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Skin Thickness</label>
                            <input type="number" name="skinthickness" placeholder="e.g. 20" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Insulin</label>
                            <input type="number" name="insulin" placeholder="e.g. 85" required min="0">
                        </div>
                        <div class="form-group">
                            <label>BMI</label>
                            <input type="number" step="0.1" name="bmi" placeholder="e.g. 28.5" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Diabetes Pedigree Function</label>
                            <input type="number" step="0.001" name="dpf" placeholder="e.g. 0.467" required min="0">
                        </div>
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" name="age" placeholder="e.g. 33" required min="1">
                        </div>
                    </div>

                    <button type="submit">🔍 Predict</button>
                </form>

                {% if prediction %}
                <div class="result {{ color }}">
                    <h3>Prediction</h3>
                    <p class="pred-text">{{ prediction }}</p>
                </div>
                {% endif %}
            </section>

            <aside class="charts-card">
                <h2>📊 Model Evaluation</h2>
                <div class="chart-stack">
                    <figure class="chart-item">
                        <figcaption>Confusion Matrix</figcaption>
                        <img src="{{ url_for('static', filename='confusion_matrix.png') }}" alt="Confusion Matrix">
                    </figure>

                    <figure class="chart-item">
                        <figcaption>K Value vs Accuracy</figcaption>
                        <img src="{{ url_for('static', filename='k_accuracy.png') }}" alt="K Accuracy">
                    </figure>
                </div>
            </aside>
        </main>

        <footer class="foot">Designed with ♥ — try different inputs to explore model behavior.</footer>

    </div>
</body>
</html>
